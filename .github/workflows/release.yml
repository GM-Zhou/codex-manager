name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codexm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: codexm-linux-amd64
            binary_name: codexm
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: codexm-windows-amd64.exe
            binary_name: codexm.exe
          - runner: macos-14
            target: x86_64-apple-darwin
            asset_name: codexm-darwin-amd64
            binary_name: codexm
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_name: codexm-darwin-arm64
            binary_name: codexm

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare release artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"
          chmod +x "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum codexm-* > SHA256SUMS

      - name: Generate release tag
        id: tag
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          timestamp="$(date -u +'%Y%m%d-%H%M%S')"
          tag="auto-v${timestamp}-${short_sha}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: codexm ${{ steps.tag.outputs.tag }}
          body: |
            Automated release for commit `${{ github.sha }}` on `master`.
          files: |
            dist/codexm-linux-amd64
            dist/codexm-windows-amd64.exe
            dist/codexm-darwin-amd64
            dist/codexm-darwin-arm64
            dist/SHA256SUMS
