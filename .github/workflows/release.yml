name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: codexm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release tag from Cargo.toml
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          if [ -z "$version" ]; then
            echo "Failed to parse version from Cargo.toml" >&2
            exit 1
          fi
          echo "release_tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view -R "${{ github.repository }}" "${{ steps.version.outputs.release_tag }}" >/dev/null 2>&1; then
            echo "Release already exists: ${{ steps.version.outputs.release_tag }}"
            exit 0
          fi
          gh release create -R "${{ github.repository }}" "${{ steps.version.outputs.release_tag }}" \
            --target "${{ github.sha }}" \
            --title "codexm ${{ steps.version.outputs.release_tag }}" \
            --notes "Automated release for version \`${{ steps.version.outputs.release_tag }}\` at commit \`${{ github.sha }}\` on \`master\`."

  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: codexm-linux-amd64
            binary_name: codexm
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: codexm-windows-amd64.exe
            binary_name: codexm.exe
          - runner: macos-14
            target: x86_64-apple-darwin
            asset_name: codexm-darwin-amd64
            binary_name: codexm
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_name: codexm-darwin-arm64
            binary_name: codexm

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain and target
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare release artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"
          chmod +x "dist/${{ matrix.asset_name }}"

      - name: Upload binary asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload -R "${{ github.repository }}" "${{ needs.prepare_release.outputs.release_tag }}" \
            "dist/${{ matrix.asset_name }}" \
            --clobber

  release:
    name: Publish checksums to release
    runs-on: ubuntu-latest
    needs:
      - prepare_release
      - build
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p dist
          for asset in \
            codexm-linux-amd64 \
            codexm-windows-amd64.exe \
            codexm-darwin-amd64 \
            codexm-darwin-arm64; do
            gh release download -R "${{ github.repository }}" "${{ needs.prepare_release.outputs.release_tag }}" --dir dist --pattern "$asset"
          done

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum codexm-* > SHA256SUMS

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload -R "${{ github.repository }}" "${{ needs.prepare_release.outputs.release_tag }}" "dist/SHA256SUMS" --clobber
