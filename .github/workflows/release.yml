name: Build and Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  RELEASE_TAG: auto-run-${{ github.run_id }}

concurrency:
  group: codexm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ env.RELEASE_TAG }}" >/dev/null 2>&1; then
            echo "Release already exists: ${{ env.RELEASE_TAG }}"
            exit 0
          fi
          gh release create "${{ env.RELEASE_TAG }}" \
            --target "${{ github.sha }}" \
            --title "codexm ${{ env.RELEASE_TAG }}" \
            --notes "Automated release for commit \`${{ github.sha }}\` on \`master\`."

  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: codexm-linux-amd64
            binary_name: codexm
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: codexm-windows-amd64.exe
            binary_name: codexm.exe
          - runner: macos-14
            target: x86_64-apple-darwin
            asset_name: codexm-darwin-amd64
            binary_name: codexm
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_name: codexm-darwin-arm64
            binary_name: codexm

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust toolchain and target
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare release artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"
          chmod +x "dist/${{ matrix.asset_name }}"

      - name: Upload binary asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ env.RELEASE_TAG }}" \
            "dist/${{ matrix.asset_name }}" \
            --clobber

  release:
    name: Publish checksums to release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p dist
          gh release download "${{ env.RELEASE_TAG }}" --dir dist --pattern "codexm-linux-amd64"
          gh release download "${{ env.RELEASE_TAG }}" --dir dist --pattern "codexm-windows-amd64.exe"
          gh release download "${{ env.RELEASE_TAG }}" --dir dist --pattern "codexm-darwin-amd64"
          gh release download "${{ env.RELEASE_TAG }}" --dir dist --pattern "codexm-darwin-arm64"

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum codexm-* > SHA256SUMS

      - name: Upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ env.RELEASE_TAG }}" "dist/SHA256SUMS" --clobber
